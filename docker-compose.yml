services:
  unifi-control:
    build: .
    image: unifi-control:latest
    container_name: unifi-control
    restart: unless-stopped
    ports:
      # Exposed on all interfaces so other devices on the LAN can reach it.
      # Change to "127.0.0.1:8787:8787" to restrict to loopback only.
      - "8787:8787"
    environment:
      UNIFI_HOST: ${UNIFI_HOST}
      UNIFI_API_KEY: ${UNIFI_API_KEY}
      UNIFI_SITE: ${UNIFI_SITE:-default}
      UNIFI_VERIFY_SSL: ${UNIFI_VERIFY_SSL:-false}
    # Alternative to env vars: mount a config.json instead.
    # volumes:
    #   - ./config.json:/config/config.json:ro
    # environment:
    #   UNIFI_CONTROL_CONFIG: /config/config.json
